<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <title>Login - InfraestruturaApp</title>
    <style>
        body { background-color: #f5f7fa; }
        .login-card { border: none; border-radius: 14px; box-shadow: 0 4px 14px rgba(0,0,0,.06); max-width: 420px; }
        .login-card .card-header { background: linear-gradient(135deg, #0d6efd, #6610f2); color: #fff; border-radius: 14px 14px 0 0; padding: 1rem 1.25rem; }
        .login-card .card-header h4 { margin: 0; font-weight: 600; }
    </style>
</head>
<body>

<div class="d-flex justify-content-center align-items-center vh-100">
    <div class="card login-card w-100 mx-3">
        <div class="card-header text-center">
            <i class="bi bi-building fs-3 d-block mb-1"></i>
            <h4>InfraestruturaApp</h4>
        </div>
        <div class="card-body p-4">
            {% if erro %}
                <div class="alert alert-danger py-2">
                    <i class="bi bi-exclamation-circle me-1"></i>{{ erro }}
                </div>
            {% endif %}

            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label for="username" class="form-label fw-semibold">Usuário</label>
                    <input type="text" id="username" name="username" class="form-control"
                           placeholder="Digite seu usuário" autofocus required>
                </div>
                <div class="mb-4">
                    <label for="password" class="form-label fw-semibold">Senha</label>
                    <input type="password" id="password" name="password" class="form-control"
                           placeholder="Digite sua senha" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">
                    <i class="bi bi-box-arrow-in-right me-1"></i>Entrar
                </button>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
