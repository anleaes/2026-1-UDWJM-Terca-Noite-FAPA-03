{% load static %}

<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="{% static 'css/style.css' %}" />
    <title>{% block title %}Infraestrutura{% endblock title %}</title>
    <style>
      body {
        background-color: #f5f7fa;
      }
      .navbar-brand {
        font-weight: 600;
        letter-spacing: 0.3px;
      }
      .app-card {
        border: none;
        border-radius: 14px;
        box-shadow: 0 4px 14px rgba(0, 0, 0, 0.06);
      }
      .app-card .card-header {
        background: linear-gradient(135deg, #0d6efd, #6610f2);
        color: #fff;
        border-radius: 14px 14px 0 0;
        padding: 1rem 1.25rem;
      }
      .app-card .card-header h4 {
        margin: 0;
        font-weight: 600;
      }
      .table thead th {
        background-color: #f1f3f5;
      }
      .badge-soft-success {
        background-color: #d1e7dd;
        color: #0f5132;
      }
      .badge-soft-danger {
        background-color: #f8d7da;
        color: #842029;
      }
    </style>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand" href="/"
          ><i class="bi bi-buildings me-2"></i>Infraestrutura</a
        >
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#mainNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item dropdown">
              <a
                class="nav-link dropdown-toggle"
                href="#"
                data-bs-toggle="dropdown"
                >Empresas</a
              >
              <ul class="dropdown-menu dropdown-menu-end">
                <li>
                  <a
                    class="dropdown-item"
                    href="{% url 'companies:list_companies' %}"
                    >Listar Empresas</a
                  >
                </li>
                <li>
                  <a
                    class="dropdown-item"
                    href="{% url 'companies:add_company' %}"
                    >Nova Empresa</a
                  >
                </li>
              </ul>
            </li>
            <li class="nav-item dropdown">
              <a
                class="nav-link dropdown-toggle"
                href="#"
                data-bs-toggle="dropdown"
                >Funcionarios</a
              >
              <ul class="dropdown-menu dropdown-menu-end">
                <li>
                  <a
                    class="dropdown-item"
                    href="{% url 'employees:list_employees' %}"
                    >Listar Funcionários</a
                  >
                </li>
                <li>
                  <a
                    class="dropdown-item"
                    href="{% url 'employees:add_employee' %}"
                    >Novo Funcionário</a
                  >
                </li>
              </ul>
            </li>
            <li class="nav-item dropdown">
              <a
                class="nav-link dropdown-toggle"
                href="#"
                data-bs-toggle="dropdown"
                >Cidadãos</a
              >
              <ul class="dropdown-menu dropdown-menu-end">
                <li>
                  <a
                    class="dropdown-item"
                    href="{% url 'citizens:list_citizens' %}"
                    >Listar Cidadãos</a
                  >
                </li>
                <li>
                  <a
                    class="dropdown-item"
                    href="{% url 'citizens:add_citizen' %}"
                    >Novo Cidadão</a
                  >
                </li>
              </ul>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <main class="container py-4">{% block body %}{% endblock body %}</main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{% static 'js/main.js' %}"></script>
  </body>
</html>
